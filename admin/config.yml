backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:

  # ------------------------------
  # SLIDER
  # ------------------------------
  - name: "slider"
    label: "Slider Beranda"
    folder: "content/slider"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: "title", label: "Judul Slider" }
      - { name: "image", label: "Gambar", widget: "image" }
      - { name: "link", label: "Link (opsional)", required: false }

  # ------------------------------
  # GALERI
  # ------------------------------
  - name: "galeri"
    label: "Foto Galeri"
    folder: "content/galeri"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: "title", label: "Nama Foto" }
      - { name: "image", label: "Gambar", widget: "image" }

  # ------------------------------
  # PENGUMUMAN
  # ------------------------------
  - name: "pengumuman"
    label: "Pengumuman / Berita"
    folder: "content/pengumuman"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: "title", label: "Judul" }
      - { name: "date", label: "Tanggal", widget: "datetime" }
      - { name: "body", label: "Isi", widget: "markdown" }

  # ------------------------------
  # AGENDA
  # ------------------------------
  - name: "agenda"
    label: "Agenda Pesantren"
    folder: "content/agenda"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: "title", label: "Judul Kegiatan" }
      - { name: "date", label: "Tanggal", widget: "datetime" }
      - { name: "body", label: "Isi Kegiatan", widget: "markdown" }
