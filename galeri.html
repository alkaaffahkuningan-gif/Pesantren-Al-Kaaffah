<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeri Lengkap - Pondok Pesantren Al-Kaaffah</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.85); display: flex; align-items:center; justify-content:center; z-index:50; }
    .lightbox img { max-width: 90%; max-height: 90%; border-radius: .5rem; }
    .lightbox img { animation: zoomIn 0.3s ease; } @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body class="bg-gray-50">

  <section class="py-16">
    <div class="container mx-auto px-4 max-w-6xl">
      <h1 class="text-3xl font-bold text-center mb-8 text-blue-700">Galeri Lengkap</h1>

      <!-- Grid foto banyak -->
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <img src="images/galeri1.jpg" alt="" class="rounded-lg shadow-md" />
        <img src="images/galeri2.jpg" alt="" class="rounded-lg shadow-md" />
        <img src="images/galeri3.jpg" alt="" class="rounded-lg shadow-md" />
        <img src="images/galeri4.jpg" alt="" class="rounded-lg shadow-md" />
        <img src="images/galeri5.jpg" alt="" class="rounded-lg shadow-md" />
        <img src="images/galeri6.jpg" alt="" class="rounded-lg shadow-md" />
        <img src="images/galeri7.jpg" alt="" class="rounded-lg shadow-md" />
        <img src="images/galeri8.jpg" alt="" class="rounded-lg shadow-md" />
      </div>
    </div>
      <div id="lightbox" class="hidden lightbox" role="dialog" aria-modal="true">
    <button id="lbClose" aria-label="Tutup galeri" class="absolute top-6 right-6 text-white text-2xl">✕</button>
    <img id="lbImg" src="" alt="">
    </div>
  </section>

<!-- Tombol Kembali Mengambang -->
<a href="javascript:history.back()" 
   class="font-bold fixed bottom-6 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-4 py-2 rounded-full shadow-xl hover:bg-blue-700 transition flex items-center gap-2 z-50">
   <!-- Icon panah -->
   <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
     <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
   </svg>
   <span>Kembali</span>
</a>
  <script>
    document.querySelectorAll('.container img').forEach(img => {
      img.addEventListener('click', () => {
        const lb = document.getElementById('lightbox');
        document.getElementById('lbImg').src = img.src;
        document.getElementById('lbImg').alt = img.alt || '';
        lb.classList.remove('hidden');
      });
    });
    document.getElementById('lbClose').addEventListener('click', () => {
      document.getElementById('lightbox').classList.add('hidden');
    });
    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target.id === 'lightbox') e.currentTarget.classList.add('hidden');
    });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') document.getElementById('lightbox').classList.add('hidden'); });
  </script>
</body>
</html>
