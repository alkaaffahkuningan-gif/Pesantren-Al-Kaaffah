backend:
  backend:
  name: github
  repo: alkaaffahkuningan-gif/Pesantren-Al-Kaaffah
  branch: main
  base_url: https://pesantren-al-kaaffah.alkaaffahkuningan.workers.dev
  auth_endpoint: api/auth
media_folder: "images"
public_folder: "/images"
collections:
  - name: slider
    label: Slider
    folder: "content/slider"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Judul, name: title, widget: string }
      - { label: Gambar, name: image, widget: image }

  - name: galeri
    label: Galeri
    folder: "content/galeri"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Judul, name: title, widget: string }
      - { label: Gambar, name: image, widget: image }

  - name: agenda
    label: Agenda
    folder: "content/agenda"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Judul, name: title, widget: string }
      - { label: Tanggal, name: tanggal, widget: string }
      - { label: Deskripsi, name: deskripsi, widget: text }
      - { label: Gambar, name: image, widget: image }

  - name: pengumuman
    label: Pengumuman
    folder: "content/pengumuman"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Judul, name: title, widget: string }
      - { label: Isi, name: body, widget: markdown }

  - name: pengaturan
    label: "Pengaturan Halaman"
    files:
      - name: profil
        label: "Profil Pesantren"
        file: "content/profil.json"
        fields:
          - { label: "Alamat", name: alamat, widget: text }
          - { label: "Tenaga Pengajar", name: tenaga_pengajar, widget: text }
          - { label: "Kurikulum Pesantren", name: kurikulum, widget: text }
          - { label: "Visi & Misi", name: visi_misi, widget: text }

      - name: pendaftaran
        label: "Pendaftaran"
        file: "content/pendaftaran.json"
        fields:
          - { label: "Judul", name: judul, widget: string }
          - { label: "Sub Judul", name: subjudul, widget: string }
          - label: "Syarat Pendaftaran"
            name: syarat
            widget: list
            field: { label: Item, name: item, widget: string }
          - label: "Alur Pendaftaran"
            name: alur
            widget: list
            field: { label: Item, name: item, widget: string }
          - label: "Materi Tes Masuk"
            name: materi_tes
            widget: list
            field: { label: Item, name: item, widget: string }

      - name: prestasi
        label: "Prestasi"
        file: "content/prestasi.json"
        fields:
          - label: "Daftar Prestasi"
            name: items
            widget: list
            fields:
              - { label: "Judul Prestasi", name: judul, widget: string }
              - { label: "Keterangan", name: keterangan, widget: string }

      - name: hero
        label: "Hero (Beranda)"
        file: "content/hero.json"
        fields:
          - { label: "Judul", name: judul, widget: string }
          - { label: "Subjudul", name: subjudul, widget: string }
          - { label: "Gambar Hero", name: gambar, widget: image }

      - name: jenjang
        label: "Jenjang Pendidikan"
        file: "content/jenjang.json"
        fields:
          - label: "SMP IT Al-Kaaffah"
            name: smp
            widget: object
            fields:
              - { label: "Gambar", name: gambar, widget: image }
              - { label: "Deskripsi", name: deskripsi, widget: text }
              - label: "Rincian Biaya"
                name: biaya
                widget: list
                field: { label: Item, name: item, widget: string }
          - label: "MA IPA Al-Kaaffah"
            name: ma
            widget: object
            fields:
              - { label: "Gambar", name: gambar, widget: image }
              - { label: "Deskripsi", name: deskripsi, widget: text }
              - label: "Rincian Biaya"
                name: biaya
                widget: list
                field: { label: Item, name: item, widget: string }

      - name: testimoni
        label: "Testimoni"
        file: "content/testimoni.json"
        fields:
          - label: "Daftar Testimoni"
            name: items
            widget: list
            fields:
              - { label: "Isi Testimoni", name: isi, widget: text }
              - { label: "Nama/Sumber", name: nama, widget: string }

      - name: kontak
        label: "Kontak & Footer"
        file: "content/kontak.json"
        fields:
          - { label: "Alamat", name: alamat, widget: text }
          - { label: "Telepon", name: telepon, widget: string }
          - { label: "Email", name: email, widget: string }
          - { label: "Link Facebook", name: facebook, widget: string }
          - { label: "Link Instagram", name: instagram, widget: string }
          - { label: "Link YouTube", name: youtube, widget: string }
          - { label: "Link WhatsApp", name: whatsapp, widget: string }
